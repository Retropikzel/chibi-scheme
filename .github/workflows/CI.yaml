name: CI

on: [push, pull_request]

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-26.04-arm, macos-latest, macos-26-intel]
    steps:
      - uses: actions/checkout@v6
      - name: Build
        run: make # assumes GNUMake
      - name: Test
        run: make test-all
      - name: Setup
        run: sudo make install
      - name: Run in PATH
        run: chibi-scheme r7rs-tests.scm
        working-directory: tests
  windows-build:
    name: windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build
        run: make
      - name: Test
        run: make test-all
      - name: Setup
        run: sudo make install
      - name: Run in PATH
        run: chibi-scheme r7rs-tests.scm
        working-directory: tests
  windows-installer:
    name: windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download NSIS
        run: curl -O nsis-setup.exe https://sourceforge.net/projects/nsis/files/NSIS%203/3.12/nsis-3.12-setup.exe/download
      - name: Install NSIS
        run: ./nsis-setup.exe /S
      - name: Build
        run: make && tree .
      - name: Setup
        run: sudo make install
        working-directory: tests
